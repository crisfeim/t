name: CI
on:
  push:
    branches: [main, master]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: brew-downloads-${{ runner.os }}-ocaml-dune-fossil-v1

      - name: Install OCaml toolchain and fossil
        run: brew install ocaml dune fossil

      - name: Run Tests
        run: make test
